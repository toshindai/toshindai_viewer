name: Generate manifests and notify Discord

on:
  push:
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  generate-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate manifest.json for each issue folder
        run: |
          python <<'PY'
          import os
          import json

          base_dir = "images"

          if not os.path.isdir(base_dir):
              raise SystemExit("images directory not found")

          for issue in os.listdir(base_dir):
              issue_path = os.path.join(base_dir, issue)
              if not os.path.isdir(issue_path):
                  continue

              pages = []
              for f in sorted(os.listdir(issue_path)):
                  lower = f.lower()
                  if lower.startswith("page") and lower.endswith(".jpg"):
                      pages.append(f)

              manifest_path = os.path.join(issue_path, "manifest.json")
              with open(manifest_path, "w", encoding="utf-8") as fp:
                  json.dump({"pages": pages}, fp, ensure_ascii=False, indent=2)
          PY

      - name: Commit manifest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/**/manifest.json
          git diff --cached --quiet || git commit -m "Auto-generate manifest.json"
          git push

      - name: Detect updated issue folder
        id: detect_issue
        run: |
          ISSUE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^images/' | cut -d'/' -f2 | sort -u | head -n 1)
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "Detected issue: $ISSUE"

      - name: Notify Discord
        if: steps.detect_issue.outputs.issue != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE: ${{ steps.detect_issue.outputs.issue }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"新しい号を更新しました：${ISSUE}\nhttps://toshindai-vewer.vercel.app/?issue=${ISSUE}\"}" \
            "$DISCORD_WEBHOOK_URL"
