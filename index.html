<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
    }

    #viewer {
      width: 100%;
      max-width: 900px;
    }

    .spread {
      display: block;
      margin-bottom: 10px;
    }

    .page {
      width: 100%;
    }

    /* PC・タブレット */
    @media (min-width: 768px) {
      .spread {
        display: flex;
        justify-content: center;
      }

      .spread img {
        width: 50%;
      }

      .spread img:only-child {
        width: 50%;
      }
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    // URLからissueを取得（なければデフォルト）
    const params = new URLSearchParams(window.location.search);
    const issue = params.get("issue") || "2026_03";

    function createSpreads(pages) {
      const spreads = [];

      if (pages.length === 1) return [[pages[0]]];

      // 最初は単ページ
      spreads.push([pages[0]]);

      let i = 1;

      while (i < pages.length - 1) {
        if (i === pages.length - 2) {
          spreads.push([pages[i]]);
          i++;
        } else {
          spreads.push([pages[i], pages[i + 1]]);
          i += 2;
        }
      }

      // 最後は単ページ
      spreads.push([pages[pages.length - 1]]);

      return spreads;
    }

    async function loadViewer() {
      const viewer = document.getElementById("viewer");
      viewer.innerHTML = "<p style='color:white'>Loading...</p>";

      try {
        const res = await fetch(`images/${issue}/manifest.json`);

        if (!res.ok) {
          viewer.innerHTML = "<p style='color:white'>この号は存在しません</p>";
          return;
        }

        const data = await res.json();
        const pages = data.pages.map(file => `images/${issue}/${file}`);
        const spreads = createSpreads(pages);

        viewer.innerHTML = "";

        spreads.forEach(spread => {
          const div = document.createElement("div");
          div.className = "spread";

          spread.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.className = "page";
            div.appendChild(img);
          });

          viewer.appendChild(div);
        });

      } catch (error) {
        viewer.innerHTML = "<p style='color:white'>読み込みエラー</p>";
      }
    }

    loadViewer();
  </script>
</body>
</html>
