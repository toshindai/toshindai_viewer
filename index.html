<div id="viewer"></div>

<script>
const pages = [
  "https://via.placeholder.com/800x1200?text=1",
  "https://via.placeholder.com/800x1200?text=2",
  "https://via.placeholder.com/800x1200?text=3",
  "https://via.placeholder.com/800x1200?text=4",
  "https://via.placeholder.com/800x1200?text=5",
  "https://via.placeholder.com/800x1200?text=6"
];

function createSpreads(pages) {
  const spreads = [];

  spreads.push([pages[0]]);

  let i = 1;

  while (i < pages.length - 1) {
    if (i === pages.length - 2) {
      spreads.push([pages[i]]);
      i++;
    } else {
      spreads.push([pages[i], pages[i + 1]]);
      i += 2;
    }
  }

  spreads.push([pages[pages.length - 1]]);

  return spreads;
}

const spreads = createSpreads(pages);
const viewer = document.getElementById("viewer");

spreads.forEach(spread => {
  const div = document.createElement("div");
  div.className = "spread";

  spread.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "page";
    div.appendChild(img);
  });

  viewer.appendChild(div);
});
</script>
